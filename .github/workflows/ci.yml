# Official package mirror CI — required for every li-langverse package repo.
# Copied by: ./scripts/li-new-package --official  and  ./scripts/ensure-package-ci.sh
# LLVM 22 via ghcr.io/li-langverse/lic-ci:ubuntu24-llvm22 (apt.llvm.org; not noble default packages).
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            code:
              - 'src/**'
              - 'li-tests/**'
              - '**/*.li'

  check:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/li-langverse/lic-ci:ubuntu24-llvm22
    env:
      LLVM_DIR: /usr/lib/llvm-22/lib/cmake/llvm
      CC: clang-22
      CXX: clang++-22
    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: li-langverse/lic
          path: lic
          ref: main

      - name: Enforce def syntax (no bare proc)
        run: |
          set -euo pipefail
          chmod +x lic/scripts/check-li-def-syntax.sh
          lic/scripts/check-li-def-syntax.sh src
          if [[ -d li-tests ]]; then
            lic/scripts/check-li-def-syntax.sh li-tests
          fi

      - name: Build lic
        working-directory: lic
        run: |
          chmod +x scripts/build.sh scripts/resolve-lic.sh 2>/dev/null || chmod +x scripts/build.sh
          ./scripts/build.sh

      - name: lic check + smoke
        env:
          LIC: ${{ github.workspace }}/lic/build/compiler/lic/lic
        run: |
          test -x "$LIC"
          if [[ -f src/lib.li ]]; then
            "$LIC" check src/lib.li
          elif [[ -f src/main.li ]]; then
            "$LIC" check src/main.li
          else
            echo "no src/lib.li or src/main.li"
            exit 1
          fi
          if [[ -f li-tests/smoke/builds.li ]]; then
            "$LIC" build li-tests/smoke/builds.li -o /dev/null
          fi

  docs-only:
    needs: changes
    if: needs.changes.outputs.code != 'true'
    runs-on: ubuntu-latest
    steps:
      - run: echo "No src/li-tests changes; skipping lic build."
